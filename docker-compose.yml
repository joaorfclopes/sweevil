services:
  mongo:
    image: mongo:8
    volumes:
      - ./docker/mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: localuser
      MONGO_INITDB_ROOT_PASSWORD: localpass
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

